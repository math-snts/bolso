<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metas • Espaço do Campeão</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6c63ff" />

  <style>
    :root {
      --bg:#f4f6fb; --card:#fff; --text:#1f2933; --muted:#6b7280;
      --primary:#6c63ff; --secondary:#00c9a7; --gold:#fbbf24;
    }
    [data-theme="dark"] {
      --bg:#0f172a; --card:#111827; --text:#e5e7eb; --muted:#9ca3af;
      --primary:#8b85ff; --secondary:#2dd4bf; --gold:#facc15;
    }
    * { box-sizing:border-box; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif }
    body { margin:0; background:var(--bg); color:var(--text); transition:.3s; min-height:100vh }

    header {
      display:flex; justify-content:space-between; align-items:center;
      padding:1rem 1.2rem;
    }
    .switch {
      cursor:pointer; padding:.4rem .8rem; border-radius:20px;
      background:var(--card); border:1px solid var(--muted);
    }

    main { max-width:900px; margin:auto; padding:1rem; padding-bottom:7rem }
    .card {
      background:var(--card); border-radius:16px; padding:1rem;
      box-shadow:0 10px 25px rgba(0,0,0,.05); margin-bottom:1rem;
    }
    .meta {
      border:1px solid var(--muted); border-radius:14px;
      padding:.9rem; margin-bottom:.8rem;
    }
    .meta small { color:var(--muted); display:block }
    .progress { height:8px; background:rgba(0,0,0,.1); border-radius:10px; margin:.4rem 0 }
    .progress span {
      display:block; height:100%; border-radius:10px;
      background:linear-gradient(135deg,var(--primary),var(--secondary));
    }

    .controls { display:flex; gap:.4rem; margin-top:.5rem }
    .controls input { flex:1 }
    .controls button {
      border:none; border-radius:10px; padding:.4rem .8rem;
      font-weight:600; cursor:pointer;
    }
    .add { background:var(--secondary) }
    .sub { background:#ef4444; color:#fff }

    .champion {
      border:2px dashed var(--gold);
      background:linear-gradient(135deg,rgba(251,191,36,.2),transparent);
    }

    .tabs {
      position:fixed; bottom:0; left:0; right:0;
      background:var(--card); display:flex; justify-content:space-around;
      padding:.6rem 0; border-top:1px solid var(--muted);
    }
    .tab { cursor:pointer; color:var(--muted) }
    .tab.active { color:var(--primary); font-weight:600 }

    .fab {
      position:fixed; bottom:4.5rem; right:1.2rem;
      width:56px; height:56px; border-radius:50%;
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:#fff; font-size:2rem; display:flex;
      align-items:center; justify-content:center;
      box-shadow:0 10px 25px rgba(0,0,0,.25);
      cursor:pointer;
    }

    .modal {
      position:fixed; inset:0; background:rgba(0,0,0,.5);
      display:none; align-items:center; justify-content:center;
    }
    .modal.active { display:flex }
    .modal-content {
      background:var(--card); border-radius:18px;
      padding:1.2rem; width:100%; max-width:420px;
    }
    input, textarea, select {
      width:100%; padding:.6rem; margin:.3rem 0 .8rem;
      border-radius:10px; border:1px solid var(--muted);
      background:transparent; color:var(--text);
    }
    .btn-primary {
      width:100%; border:none; padding:.7rem;
      border-radius:12px; font-weight:600;
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:#fff; cursor:pointer;
    }
  </style>
</head>

<body data-theme="light">
<header>
  <h1>🏆 Metas</h1>
  <div class="switch" onclick="toggleTheme()">🌗</div>
</header>

<main>
  <section id="tab-goals">
    <div class="card">
      <h2>Metas em andamento</h2>
      <div id="goals"></div>
    </div>
  </section>

  <section id="tab-champions" style="display:none">
    <div class="card">
      <h2>Espaço do Campeão</h2>
      <div id="champions"></div>
    </div>
  </section>
</main>

<div class="fab" onclick="openModal()">+</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Nova meta financeira</h3>
    <input id="title" placeholder="Título" />
    <textarea id="description" placeholder="Descrição"></textarea>
    <input id="target" type="number" step="0.01" placeholder="Valor total (R$)" />
    <button class="btn-primary" onclick="addGoal()">Salvar</button>
  </div>
</div>

<nav class="tabs">
  <div class="tab active" onclick="switchTab('goals',this)">📋 Metas</div>
  <div class="tab" onclick="switchTab('champions',this)">🏅 Campeão</div>
</nav>

<script>
const goals = JSON.parse(localStorage.getItem('goals')) || [];
const champions = JSON.parse(localStorage.getItem('champions')) || [];

function save() {
  localStorage.setItem('goals', JSON.stringify(goals));
  localStorage.setItem('champions', JSON.stringify(champions));
}

function addGoal() {
  if (!title.value) return;
  goals.push({
    title: title.value,
    description: description.value,
    target: +target.value,
    current: 0,
    start: new Date().toISOString(),
    end: null
  });
  closeModal(); render(); save();
}

function applyValue(i, sign) {
  const v = parseFloat(document.getElementById('val-'+i).value) || 0;
  goals[i].current = Math.max(0, goals[i].current + v * sign);
  if (goals[i].current >= goals[i].target) completeGoal(i);
  render(); save();
}

function completeGoal(i) {
  const g = goals.splice(i,1)[0];
  g.end = new Date().toISOString();
  champions.push(g);
}

function render() {
  goalsDiv.innerHTML = championsDiv.innerHTML = '';
  goals.forEach((m,i)=>{
    const pct = Math.round((m.current/m.target)*100);
    goalsDiv.innerHTML += `
      <div class="meta">
        <h3>${m.title}</h3>
        <small>Início: ${new Date(m.start).toLocaleDateString()}</small>
        <small>R$ ${m.current.toFixed(2)} / ${m.target.toFixed(2)} (${pct}%)</small>
        <div class="progress"><span style="width:${pct}%"></span></div>
        <p>${m.description}</p>
        <div class="controls">
          <input id="val-${i}" type="number" step="0.01" placeholder="Valor">
          <button class="add" onclick="applyValue(${i},1)">+</button>
          <button class="sub" onclick="applyValue(${i},-1)">−</button>
        </div>
      </div>`;
  });
  champions.forEach(m=>{
    championsDiv.innerHTML += `
      <div class="meta champion">
        <h3>🏅 ${m.title}</h3>
        <small>${new Date(m.start).toLocaleDateString()} → ${new Date(m.end).toLocaleDateString()}</small>
        <p>${m.description}</p>
      </div>`;
  });
}

function toggleTheme() {
  document.body.dataset.theme =
    document.body.dataset.theme === 'light' ? 'dark' : 'light';
}
function openModal(){ modal.classList.add('active'); }
function closeModal(){ modal.classList.remove('active'); }
function switchTab(t,e){
  tabGoals.style.display = t==='goals'?'block':'none';
  tabChampions.style.display = t==='champions'?'block':'none';
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  e.classList.add('active');
}

const goalsDiv = document.getElementById('goals');
const championsDiv = document.getElementById('champions');
const tabGoals = document.getElementById('tab-goals');
const tabChampions = document.getElementById('tab-champions');

render();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js');
  });
}
</script>

</body>
</html>
