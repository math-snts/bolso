<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="manifest.json">
    <title>Metas • Espaço do Campeão</title>
    <style>
         :root {
            --bg: #f4f6fb;
            --card: #fff;
            --text: #1f2933;
            --muted: #6b7280;
            --primary: #6c63ff;
            --secondary: #00c9a7;
            --gold: #fbbf24
        }
        
        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #111827;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --primary: #8b85ff;
            --secondary: #2dd4bf;
            --gold: #facc15
        }
        
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif
        }
        
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: .3s
        }
        
        header {
            padding: 1rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center
        }
        
        header h1 {
            margin: 0;
            font-size: 1.3rem
        }
        
        .switch {
            cursor: pointer;
            padding: .4rem .8rem;
            border-radius: 20px;
            background: var(--card);
            border: 1px solid var(--muted)
        }
        
        main {
            padding: 1rem;
            max-width: 900px;
            margin: auto;
            padding-bottom: 7rem
        }
        
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .05);
            margin-bottom: 1rem
        }
        
        .meta {
            border: 1px solid var(--muted);
            border-radius: 14px;
            padding: .9rem;
            margin-bottom: .8rem
        }
        
        .meta h3 {
            margin: 0 0 .3rem;
            font-size: 1rem
        }
        
        .meta small {
            color: var(--muted);
            display: block
        }
        
        .progress {
            background: rgba(0, 0, 0, .1);
            border-radius: 10px;
            height: 8px;
            margin: .4rem 0
        }
        
        .progress span {
            display: block;
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary))
        }
        
        .controls {
            display: flex;
            gap: .4rem;
            margin-top: .5rem;
            align-items: center
        }
        
        .controls input {
            flex: 1
        }
        
        .controls button {
            border: none;
            border-radius: 10px;
            padding: .4rem .8rem;
            font-weight: 600;
            cursor: pointer
        }
        
        .add {
            background: var(--secondary)
        }
        
        .sub {
            background: #ef4444;
            color: #fff
        }
        
        .champion {
            border: 2px dashed var(--gold);
            background: linear-gradient(135deg, rgba(251, 191, 36, .2), transparent)
        }
        
        .tabs {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            display: flex;
            justify-content: space-around;
            padding: .6rem 0;
            border-top: 1px solid var(--muted)
        }
        
        .tab {
            font-size: .85rem;
            cursor: pointer;
            color: var(--muted)
        }
        
        .tab.active {
            color: var(--primary);
            font-weight: 600
        }
        
        .fab {
            position: fixed;
            bottom: 4.5rem;
            right: 1.2rem;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .25)
        }
        
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .5);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem
        }
        
        .modal.active {
            display: flex
        }
        
        .modal-content {
            background: var(--card);
            border-radius: 18px;
            padding: 1.2rem;
            width: 100%;
            max-width: 420px
        }
        
        label {
            font-size: .8rem;
            color: var(--muted)
        }
        
        input,
        textarea,
        select {
            width: 100%;
            padding: .6rem;
            margin: .3rem 0 .8rem;
            border-radius: 10px;
            border: 1px solid var(--muted);
            background: transparent;
            color: var(--text)
        }
        
        .btn-primary {
            width: 100%;
            border: none;
            padding: .7rem;
            border-radius: 12px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            cursor: pointer
        }
    </style>
</head>

<body data-theme="light">
    <header>
        <h1>🏆 Metas</h1>
        <div class="switch" onclick="toggleTheme()">🌗</div>
    </header>

    <main>
        <section id="tab-goals">
            <div class="card">
                <h2>Metas em andamento</h2>
                <div id="goals"></div>
            </div>
        </section>
        <section id="tab-champions" style="display:none">
            <div class="card">
                <h2>Espaço do Campeão</h2>
                <div id="champions"></div>
            </div>
        </section>
    </main>

    <div class="fab" onclick="openModal()">+</div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3>Nova meta financeira</h3>
            <label>Título</label><input id="title" />
            <label>Descrição</label><textarea id="description"></textarea>
            <label>Valor total da meta / dívida (R$)</label><input type="number" step="0.01" id="target" />
            <label>Importância</label><select id="importance"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
            <button class="btn-primary" onclick="addGoal()">Salvar meta</button>
        </div>
    </div>

    <nav class="tabs">
        <div class="tab active" onclick="switchTab('goals',this)">📋 Metas</div>
        <div class="tab" onclick="switchTab('champions',this)">🏅 Campeão</div>
    </nav>

    <script>
        const goals = JSON.parse(localStorage.getItem('goals')) || [];
        const champions = JSON.parse(localStorage.getItem('champions')) || [];

        function save() {
            localStorage.setItem('goals', JSON.stringify(goals));
            localStorage.setItem('champions', JSON.stringify(champions))
        }

        function addGoal() {
            const title = document.getElementById('title').value.trim();
            if (!title) return;
            goals.push({
                title,
                description: description.value,
                target: +target.value,
                current: 0,
                importance: +importance.value,
                start: new Date().toISOString(),
                end: null
            });
            closeModal();
            render();
            save()
        }

        function applyValue(i, sign) {
            const input = document.getElementById('val-' + i);
            let v = parseFloat(input.value) || 0;
            goals[i].current = Math.max(0, goals[i].current + (v * sign));
            if (goals[i].current >= goals[i].target) completeGoal(i);
            render();
            save()
        }

        function completeGoal(i) {
            const g = goals.splice(i, 1)[0];
            g.end = new Date().toISOString();
            champions.push(g)
        }

        function formatDate(d) {
            return new Date(d).toLocaleDateString('pt-BR')
        }

        function render() {
            const g = document.getElementById('goals');
            const c = document.getElementById('champions');
            g.innerHTML = '';
            c.innerHTML = '';
            goals.forEach((m, i) => {
                const pct = Math.min(100, Math.round((m.current / m.target) * 100));
                g.innerHTML += `
<div class="meta">
<h3>${m.title}</h3>
<small>Início: ${formatDate(m.start)}</small>
<small>R$ ${m.current.toFixed(2)} / R$ ${m.target.toFixed(2)} • ${pct}%</small>
<div class="progress"><span style="width:${pct}%"></span></div>
<p>${m.description}</p>
<div class="controls">
<input type="number" step="0.01" id="val-${i}" placeholder="Valor" />
<button class="add" onclick="applyValue(${i},1)">+</button>
<button class="sub" onclick="applyValue(${i},-1)">−</button>
</div>
</div>`
            });

            champions.forEach(m => {
                c.innerHTML += `
<div class="meta champion">
<h3>🏅 ${m.title}</h3>
<small>Início: ${formatDate(m.start)}</small>
<small>Conclusão: ${formatDate(m.end)}</small>
<p>${m.description}</p>
</div>`
            })
        }

        function switchTab(t, e) {
            document.getElementById('tab-goals').style.display = t === 'goals' ? 'block' : 'none';
            document.getElementById('tab-champions').style.display = t === 'champions' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            e.classList.add('active')
        }

        function openModal() {
            document.getElementById('modal').classList.add('active') s
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active')
        }

        function toggleTheme() {
            document.body.dataset.theme = document.body.dataset.theme === 'light' ? 'dark' : 'light'
        }
        render();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>

</html>
